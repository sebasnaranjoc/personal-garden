<section>
  <h1>Proyectos</h1>
  <p>Una selección de cosas en las que estoy trabajando.</p>

  <ul class="cards">
    @for (project of projects; track project.name) {
      <li class="card">
        <h2>{{ project.name }}</h2>
        <p>{{ project.description }}</p>
      </li>
    }
  </ul>
</section>
